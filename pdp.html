<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Product — NEXORA</title>
  <meta name="description" id="page-desc" content="Premium footwear from NEXORA." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="pdp-page">

  <div id="nav-root"></div>

  <!-- Breadcrumb -->
  <div class="breadcrumb" id="breadcrumb-root">
    <a href="index.html">Home</a><span class="sep">/</span>
    <a href="plp.html">Shop</a><span class="sep">/</span>
    <span class="current" id="breadcrumb-name">Loading...</span>
  </div>

  <!-- Main product area -->
  <div class="pdp-main" id="pdp-main">
    <!-- Rendered by JS -->
  </div>

  <!-- Tabs -->
  <div class="pdp-tabs-section" id="pdp-tabs-section" style="display:none">
    <div class="pdp-tabs" role="tablist">
      <button class="pdp-tab active" role="tab" data-tab="description" aria-selected="true">Description</button>
      <button class="pdp-tab" role="tab" data-tab="specs" aria-selected="false">Specifications</button>
      <button class="pdp-tab" role="tab" data-tab="reviews" aria-selected="false">Reviews</button>
    </div>
    <div id="tab-description" class="pdp-tab-panel active" role="tabpanel"></div>
    <div id="tab-specs" class="pdp-tab-panel" role="tabpanel"></div>
    <div id="tab-reviews" class="pdp-tab-panel" role="tabpanel"></div>
  </div>

  <!-- Related products -->
  <div class="pdp-related" id="pdp-related" style="display:none">
    <span class="section-kicker">YOU MAY ALSO LIKE</span>
    <h2 class="section-title" style="margin-top:4px">Complete the Look</h2>
    <div class="pdp-related-grid" id="related-grid"></div>
  </div>

  <div id="footer-root"></div>

  <script src="assets/app.js"></script>
  <script>
    document.getElementById('nav-root').innerHTML = renderNav('plp');
    document.getElementById('footer-root').innerHTML = renderFooter();
    initNav();

    /* ── State ── */
    let product = null;
    let selectedSize = null;
    let selectedColor = null;
    let qty = 1;
    let mainImgIndex = 0;

    /* ── Load product from URL ── */
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    product = NEXORA_PRODUCTS.find(p => p.id === productId);

    if (!product) {
      document.getElementById('pdp-main').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;padding:120px 20px">
          <div class="empty-state-icon">😕</div>
          <h3>Product not found</h3>
          <p>We couldn't find that product. Let's get you back to shopping.</p>
          <a href="plp.html" class="btn-primary" style="margin-top:8px">Browse All Shoes</a>
        </div>`;
    } else {
      initProduct();
    }

    function initProduct() {
      document.title = `${product.name} — NEXORA`;
      document.getElementById('page-title').textContent = `${product.name} — NEXORA`;
      document.getElementById('page-desc').content = product.description;
      document.getElementById('breadcrumb-name').textContent = product.name;

      selectedColor = product.colors[0];
      selectedSize = null;

      renderMain();
      renderTabs();
      renderRelated();

      document.getElementById('pdp-tabs-section').style.display = 'block';
      document.getElementById('pdp-related').style.display = 'block';
    }

    /* ══ MAIN PANEL ══ */
    function renderMain() {
      const wishActive = isWishlisted(product.id) ? 'active' : '';
      const oldPriceHTML = product.oldPrice ? `<span class="pdp-price-old">${formatPrice(product.oldPrice)}</span>` : '';
      const saveHTML = product.oldPrice ? `<span class="pdp-price-save">Save ${formatPrice(product.oldPrice - product.price)}</span>` : '';
      const badgeHTML = product.badge ? `<span class="product-card-badge ${product.badgeType}" style="position:relative;top:auto;left:auto">${product.badge}</span>` : '';

      document.getElementById('pdp-main').innerHTML = `
      <!-- Gallery -->
      <div class="pdp-gallery">
        <div class="pdp-main-img-wrap">
          <img id="pdp-main-img" src="${product.images[0]}" alt="${product.name}" class="pdp-main-img" />
        </div>
        <div class="pdp-thumb-row">
          ${product.images.map((img, i) => `
            <div class="pdp-thumb ${i===0?'active':''}" data-index="${i}" onclick="selectImg(${i})" tabindex="0" role="button" aria-label="View image ${i+1}">
              <img src="${img}" alt="${product.name} view ${i+1}" loading="lazy" />
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Info -->
      <div class="pdp-info">
        <div>
          <div class="pdp-category">${product.category}</div>
          <h1 class="pdp-name">${product.name}</h1>
        </div>

        <div class="pdp-rating-row">
          ${starsHTML(product.rating)}
          <span class="pdp-review-count">${product.rating} · ${product.reviewCount.toLocaleString()} reviews</span>
          <div class="pdp-badge-row">
            ${badgeHTML}
            ${product.tags.slice(0,2).map(t => `<span class="pdp-badge">${t}</span>`).join('')}
          </div>
        </div>

        <div class="pdp-price-row">
          <span class="pdp-price">${formatPrice(product.price)}</span>
          ${oldPriceHTML}
          ${saveHTML}
        </div>

        <div class="pdp-divider"></div>

        <!-- Color -->
        <div>
          <div class="pdp-section-label">Color <span id="selected-color-name">${selectedColor.name}</span></div>
          <div class="pdp-colors">
            ${product.colors.map((c, i) => `
              <button class="pdp-color-btn ${i===0?'active':''}" style="background:${c.hex};border-color:${i===0?'var(--black)':'transparent'}"
                onclick="selectColor(${i},this)" title="${c.name}" aria-label="${c.name}" aria-pressed="${i===0}"></button>
            `).join('')}
          </div>
        </div>

        <!-- Size -->
        <div>
          <div class="pdp-section-label">Size (US) <span id="selected-size-name">${selectedSize || '— Select a size'}</span></div>
          <div class="pdp-sizes">
            ${product.sizes.map(s => {
              const so = product.soldOut.includes(s);
              return `<button class="pdp-size-btn${so?' sold-out':''}" data-size="${s}" onclick="${so?'':'selectSize('+s+',this)'}" ${so?'disabled':''} aria-label="Size ${s}${so?' - Sold out':''}">${s}</button>`;
            }).join('')}
          </div>
          <div id="size-error" style="font-size:13px;color:var(--error);margin-top:8px;display:none">Please select a size</div>
        </div>

        <!-- Qty -->
        <div>
          <div class="pdp-section-label">Quantity</div>
          <div class="qty-stepper" style="width:fit-content">
            <button class="qty-btn" onclick="changeQty(-1)" aria-label="Decrease quantity">−</button>
            <span class="qty-num" id="qty-display">1</span>
            <button class="qty-btn" onclick="changeQty(1)" aria-label="Increase quantity">+</button>
          </div>
        </div>

        <!-- CTA -->
        <div class="pdp-cta-row">
          <button class="btn-primary btn-purple pdp-add-btn" onclick="addToCartPDP()" id="pdp-add-btn">
            Add to Bag
          </button>
          <button class="pdp-wish-btn ${wishActive}" id="pdp-wish-btn" onclick="toggleWishPDP()" aria-label="Add to wishlist">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>

        <!-- Reassurance -->
        <div class="pdp-reassurance">
          <div class="pdp-reassurance-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Authentic guarantee</div>
          <div class="pdp-reassurance-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Free shipping $75+</div>
          <div class="pdp-reassurance-item"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>30-day free returns</div>
        </div>
      </div>`;

      /* thumbnail keyboard nav */
      document.querySelectorAll('.pdp-thumb').forEach(t => {
        t.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') { selectImg(+t.dataset.index); }});
      });
    }

    /* ── Gallery ── */
    function selectImg(i) {
      mainImgIndex = i;
      document.getElementById('pdp-main-img').src = product.images[i];
      document.querySelectorAll('.pdp-thumb').forEach((t,j) => t.classList.toggle('active', j===i));
    }

    /* ── Color ── */
    function selectColor(i, btn) {
      selectedColor = product.colors[i];
      document.getElementById('selected-color-name').textContent = selectedColor.name;
      document.querySelectorAll('.pdp-color-btn').forEach((b,j) => {
        b.classList.toggle('active', j===i);
        b.setAttribute('aria-pressed', j===i ? 'true' : 'false');
        b.style.borderColor = j===i ? 'var(--black)' : 'transparent';
      });
    }

    /* ── Size ── */
    function selectSize(size, btn) {
      selectedSize = size;
      document.getElementById('selected-size-name').textContent = `US ${size}`;
      document.getElementById('size-error').style.display = 'none';
      document.querySelectorAll('.pdp-size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    /* ── Qty ── */
    function changeQty(delta) {
      qty = Math.max(1, Math.min(10, qty + delta));
      document.getElementById('qty-display').textContent = qty;
    }

    /* ── Add to cart ── */
    function addToCartPDP() {
      if (!selectedSize) {
        document.getElementById('size-error').style.display = 'block';
        document.getElementById('size-error').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return;
      }
      const btn = document.getElementById('pdp-add-btn');
      btn.textContent = '✓ Added!';
      btn.style.background = 'var(--success)';
      for (let i = 0; i < qty; i++) {
        addToCart({ id: product.id, name: product.name, price: product.price, image: product.images[0], category: product.category, size: selectedSize, color: selectedColor.hex, colorName: selectedColor.name });
      }
      setTimeout(() => { btn.textContent = 'Add to Bag'; btn.style.background = ''; }, 1800);
    }

    /* ── Wishlist ── */
    function toggleWishPDP() {
      const active = toggleWishlist(product.id);
      document.getElementById('pdp-wish-btn').classList.toggle('active', active);
      showToast(active ? 'Added to wishlist!' : 'Removed from wishlist');
    }

    /* ══ TABS ══ */
    function renderTabs() {
      // Description
      document.getElementById('tab-description').innerHTML = `
        <div style="max-width:720px;font-size:16px;line-height:1.75;color:var(--gray-dark)">${product.description}</div>`;

      // Specs
      document.getElementById('tab-specs').innerHTML = `
        <table class="pdp-specs-table" style="max-width:560px">
          <tbody>${product.specs.map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</tbody>
        </table>`;

      // Reviews
      const REVIEWS = [
        { name:'Jordan K.', rating:5, date:'June 2026', text:`"Best sneakers I've bought. Cushioning is insane and they look great."`, color:'#E8D8F8', tc:'var(--purple)' },
        { name:'Priya S.',  rating:5, date:'May 2026',  text:`"Stylish enough for a night out but comfy for all-day wear. Incredible quality."`, color:'#FFE4E6', tc:'#E14B1D' },
        { name:'Marcus T.', rating:4, date:'May 2026', text:`"Lived up to its name. Super light, great fit. Runs slightly narrow."`, color:'#E0F2FE', tc:'#0284C7' },
      ];
      document.getElementById('tab-reviews').innerHTML = `
        <div style="max-width:720px">
          <div style="display:flex;align-items:center;gap:20px;margin-bottom:32px;padding:24px;background:var(--gray-light);border-radius:16px">
            <div style="text-align:center"><div style="font-size:52px;font-weight:900;line-height:1">${product.rating}</div><div class="stars" style="justify-content:center;margin:4px 0">${starsHTML(product.rating)}</div><div style="font-size:13px;color:var(--gray-text)">${product.reviewCount.toLocaleString()} reviews</div></div>
          </div>
          <div class="pdp-reviews-grid">
            ${REVIEWS.map(r => `
              <div class="pdp-review-card">
                <div class="pdp-review-header">
                  <div class="pdp-review-avatar" style="background:${r.color};color:${r.tc}">${r.name[0]}</div>
                  <div>
                    <div class="pdp-review-name">${r.name}</div>
                    <div class="pdp-review-date">${r.date}</div>
                  </div>
                  ${starsHTML(r.rating)}
                </div>
                <p class="pdp-review-text">${r.text}</p>
                <span class="pdp-review-tag">${product.name}</span>
              </div>
            `).join('')}
          </div>
        </div>`;

      /* Tab switching */
      document.querySelectorAll('.pdp-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.pdp-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
          document.querySelectorAll('.pdp-tab-panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active'); tab.setAttribute('aria-selected','true');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
      });
    }

    /* ══ RELATED ══ */
    function renderRelated() {
      const related = NEXORA_PRODUCTS.filter(p => p.id !== product.id && p.category === product.category).slice(0, 4);
      if (related.length === 0) { document.getElementById('pdp-related').style.display = 'none'; return; }
      document.getElementById('related-grid').innerHTML = related.map(p => renderProductCard(p)).join('');
    }
  </script>
</body>
</html>
